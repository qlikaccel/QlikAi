name: CI Checks

on:
  pull_request:
    branches: [ "main", "prod" ]
  push:
    branches: [ "main", "prod" ]

jobs:
  ci:
    name: Frontend + Backend CI
    runs-on: ubuntu-latest

    steps:
    # -----------------------
    # Checkout code
    # -----------------------
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0  # Required for SonarQube

    # =======================
    # FRONTEND (React + TS)
    # =======================
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 22
        cache: npm
        cache-dependency-path: qlik_app/converter/csv/package-lock.json

    - name: Install frontend dependencies
      working-directory: qlik_app/converter/csv
      run: npm ci

    - name: Lint frontend
      working-directory: qlik_app/converter/csv
      run: npm run lint || true

    - name: Test frontend
      working-directory: qlik_app/converter/csv
      run: npm test -- --watch=false || true

    # =======================
    # BACKEND (Python)
    # =======================
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
